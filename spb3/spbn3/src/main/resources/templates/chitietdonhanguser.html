<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn hàng | Clothing Shop</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .detail-container {
            max-width: 800px;
            margin: 40px auto;
        }

        .order-header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-list {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
        }

        .product-item {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .info-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow-sm);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container section-padding">
        <div class="detail-container">
            <a href="/khach-hang/don-hang"
                style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px; color: var(--text-secondary); text-decoration: none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Quay lại lịch sử đơn hàng
            </a>

            <div class="order-header">
                <div>
                    <h2 th:text="'Đơn hàng #' + ${dh.id}">Đơn hàng #001</h2>
                    <p style="color: var(--text-secondary); font-size: 14px; margin-top: 5px;"
                        th:text="'Đặt ngày ' + ${#temporals.format(dh.ngayDat, 'dd/MM/yyyy HH:mm')}"></p>
                </div>
                <span class="status-badge" style="background: rgba(46, 213, 115, 0.1); color: #2ed573;"
                    th:text="${dh.trangThai}">Đang xử lý</span>
            </div>

            <div class="product-list">
                <h3 style="margin-bottom: 20px;">Sản phẩm đã chọn</h3>
                <div class="product-item" th:each="item : ${items}">
                    <!-- Case 1: Product exists -->
                    <th:block th:if="${item.sanPham != null}">
                        <img th:src="@{'/images/' + ${item.sanPham.hinhAnh}}" class="product-img"
                            onerror="this.src='https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&q=80&w=800'">
                        <div style="flex: 1;">
                            <h4 th:text="${item.sanPham.ten}" style="font-size: 16px; margin-bottom: 5px;">Product Name
                            </h4>
                            <p style="font-size: 13px; color: var(--text-secondary);"
                                th:text="${item.size + ' | ' + item.mau + ' x ' + item.soLuong}"></p>
                        </div>
                    </th:block>

                    <!-- Case 2: Product deleted -->
                    <th:block th:unless="${item.sanPham != null}">
                        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&q=80&w=800"
                            class="product-img">
                        <div style="flex: 1;">
                            <h4 style="font-size: 16px; margin-bottom: 5px; color: var(--text-secondary);">Sản phẩm đã
                                bị xóa hoặc không còn tồn tại</h4>
                            <p style="font-size: 13px; color: var(--text-secondary);"
                                th:text="${item.size + ' | ' + item.mau + ' x ' + item.soLuong}"></p>
                        </div>
                    </th:block>

                    <div style="text-align: right;">
                        <div style="font-weight: 700; color: var(--accent-color);"
                            th:text="${#numbers.formatDecimal(item.donGia * item.soLuong, 0, 'COMMA', 0, 'POINT') + ' đ'}">
                        </div>
                        <div style="font-size: 12px; color: var(--text-secondary);" th:if="${item.soLuong > 1}"
                            th:text="'(' + ${#numbers.formatDecimal(item.donGia, 0, 'COMMA', 0, 'POINT')} + ' đ/cái)'">
                        </div>
                    </div>
                </div>

                <div
                    style="margin-top: 25px; padding-top: 20px; border-top: 2px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: 600;">Tổng thanh toán</span>
                    <span style="font-size: 24px; font-weight: 700; color: var(--accent-color);"
                        th:text="${#numbers.formatDecimal(dh.tongTien, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <h3 style="margin-bottom: 15px; font-size: 16px;">👤 Thông tin người nhận</h3>
                    <p style="margin-bottom: 8px;"><strong style="font-weight: 600;">Họ tên:</strong> <span
                            th:text="${dh.tenNhan}"></span></p>
                    <p style="margin-bottom: 8px;"><strong style="font-weight: 600;">SĐT:</strong> <span
                            th:text="${dh.sdt}"></span></p>
                    <p><strong style="font-weight: 600;">Địa chỉ:</strong> <span th:text="${dh.diaChi}"></span></p>
                </div>
                <div class="info-card">
                    <h3 style="margin-bottom: 15px; font-size: 16px;">📝 Ghi chú đơn hàng</h3>
                    <p style="color: var(--text-secondary); font-style: italic;"
                        th:text="${dh.ghiChu != null and dh.ghiChu != '' ? dh.ghiChu : 'Không có ghi chú'}"></p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
