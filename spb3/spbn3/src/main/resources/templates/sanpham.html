<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm | Admin Premium</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --border-radius-lg: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .admin-main {
            padding: 40px;
        }

        .premium-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius-lg);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .product-img-cell {
            width: 56px;
            height: 68px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 2px solid white;
        }

        .admin-table th {
            background: #f1f5f9;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
            text-transform: none;
            padding: 18px 25px;
        }

        .admin-table td {
            padding: 20px 25px;
            border-bottom: 1px solid #f1f5f9;
        }

        .category-badge {
            background: #e0e7ff;
            color: #4338ca;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .stock-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stock-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .stock-high {
            background-color: #10b981;
        }

        .stock-low {
            background-color: #f59e0b;
        }

        .stock-empty {
            background-color: #ef4444;
        }

        /* Form Styling */
        .premium-form {
            padding: 30px;
        }

        .form-header {
            background: var(--primary-gradient);
            padding: 25px 30px;
            color: white;
            border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .premium-input {
            width: 100%;
            padding: 12px 16px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .premium-input:focus {
            border-color: #6366f1;
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .preview-container {
            width: 100%;
            height: 200px;
            background: #f1f5f9;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #cbd5e1;
            margin-bottom: 20px;
        }

        .preview-container img {
            max-height: 100%;
            object-fit: contain;
        }

        .btn-modern {
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            width: 100%;
            font-size: 15px;
        }

        .btn-modern-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }

        .btn-modern-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.35);
        }

        .action-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: #f1f5f9;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #e2e8f0;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div th:replace="~{fragments/admin_sidebar :: admin-sidebar(currentPage='products')}"></div>

    <main class="admin-main">
        <header class="admin-header" style="margin-bottom: 40px;">
            <div>
                <h1 class="admin-title">Quản lý kho hàng</h1>
                <p style="color: #64748b; margin-top: 5px;">Cập nhật sản phẩm, tồn kho và danh mục của bạn tại đây.</p>
            </div>
            <div class="premium-card"
                style="padding: 15px 25px; border-radius: 12px; display: flex; align-items: center; gap: 15px;">
                <div style="background: #e0e7ff; padding: 10px; border-radius: 10px; color: #4338ca;">📦</div>
                <div>
                    <div style="font-size: 12px; color: #64748b; font-weight: 500;">Tổng sản phẩm</div>
                    <div style="font-size: 20px; font-weight: 700;" th:text="${dsSanPham.size()}">0</div>
                </div>
            </div>
        </header>

        <div style="display: grid; grid-template-columns: 1fr 420px; gap: 40px; align-items: start;">

            <!-- Product List -->
            <div class="premium-card">
                <div class="card-header" style="border: none; padding: 25px 30px;">
                    <h3 class="card-title" style="font-size: 18px;">Danh mục sản phẩm</h3>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Danh mục</th>
                            <th>Đơn giá</th>
                            <th>Tồn kho</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sp : ${dsSanPham}">
                            <td>
                                <div style="display: flex; gap: 15px; align-items: center;">
                                    <img th:src="@{'/images/' + ${sp.hinhAnh}}" class="product-img-cell"
                                        onerror="this.src='https://via.placeholder.com/100x120?text=No+Image'">
                                    <div>
                                        <div style="font-weight: 600; color: #1e293b;" th:text="${sp.ten}"></div>
                                        <div style="font-size: 11px; color: #94a3b8;" th:text="'ID: #' + ${sp.id}">
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="category-badge" th:text="${sp.loai}"></span>
                            </td>
                            <td style="font-weight: 700; color: #1e293b;"
                                th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                            <td>
                                <div class="stock-indicator">
                                    <div class="stock-dot"
                                        th:classappend="${sp.soLuong > 20 ? 'stock-high' : (sp.soLuong > 5 ? 'stock-low' : 'stock-empty')}">
                                    </div>
                                    <span th:text="${sp.soLuong}"></span>
                                </div>
                            </td>
                            <td>
                                <div style="display: flex; gap: 12px;">
                                    <a th:href="@{/admin/san-pham/edit/{id}(id=${sp.id})}" class="action-btn"
                                        title="Sửa">✏️</a>
                                    <a th:href="@{/admin/san-pham/delete/{id}(id=${sp.id})}" class="action-btn"
                                        style="color: #ef4444;" title="Xóa"
                                        onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')">🗑️</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Form Sidebar -->
            <div class="premium-card" id="form-section">
                <div class="form-header">
                    <h3 style="margin: 0; font-size: 18px; font-weight: 700;">
                        <span th:text="${sanPham.id == 0 ? '✨ Thêm mặt hàng mới' : '✏️ Chỉnh sửa thông tin'}"></span>
                    </h3>
                </div>
                <div class="premium-form">
                    <form th:action="@{/admin/san-pham/save}" th:object="${sanPham}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="preview-container">
                            <img id="preview-img"
                                th:src="*{hinhAnh != null && !hinhAnh.isEmpty() ? '/images/' + hinhAnh : 'https://via.placeholder.com/200x250?text=Scan+QR+to+Upload'}"
                                onerror="this.src='https://via.placeholder.com/200x250?text=No+Image'">
                        </div>

                        <div class="input-group">
                            <label class="input-label">Tên sản phẩm</label>
                            <input type="text" th:field="*{ten}" class="premium-input"
                                placeholder="Ví dụ: Áo Sơ Mi Oxford..." required>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="input-group">
                                <label class="input-label">Danh mục</label>
                                <select th:field="*{loai}" class="premium-input" required>
                                    <option value="Áo">Áo</option>
                                    <option value="Quần">Quần</option>
                                    <option value="Phụ kiện">Phụ kiện</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Số lượng</label>
                                <input type="number" th:field="*{soLuong}" class="premium-input" placeholder="0"
                                    required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Giá bán (VNĐ)</label>
                            <input type="number" th:field="*{gia}" class="premium-input" placeholder="0" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Tên tệp hình ảnh (trong thư mục images)</label>
                            <input type="text" th:field="*{hinhAnh}" id="img-input" class="premium-input"
                                placeholder="ten-file.jpg"
                                oninput="document.getElementById('preview-img').src = '/images/' + this.value">
                            <small style="color: #94a3b8; font-size: 11px; margin-top: 5px; display: block;">Lưu ý: Bạn
                                chỉ cần nhập tên file (vd: sp1.jpg)</small>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Mô tả sản phẩm</label>
                            <textarea th:field="*{moTa}" class="premium-input" style="height: 100px; resize: none;"
                                placeholder="Thông tin chất liệu, form dáng..."></textarea>
                        </div>

                        <div style="margin-top: 10px; display: flex; gap: 15px;">
                            <button type="submit" class="btn-modern btn-modern-primary">
                                <span
                                    th:text="${sanPham.id == 0 ? '🚀 Đăng bán sản phẩm' : '💾 Cập nhật thông tin'}"></span>
                            </button>
                        </div>
                        <div style="text-align: center; margin-top: 15px;">
                            <a href="/admin/san-pham"
                                style="color: #94a3b8; font-size: 14px; text-decoration: none;">Hủy bỏ & Làm mới</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
