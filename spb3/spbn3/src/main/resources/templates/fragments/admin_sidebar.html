<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <aside th:fragment="admin-sidebar(currentPage)" class="admin-sidebar">
        <div class="admin-logo">
            👕 CLOTHING ADMIN
        </div>

        <nav class="admin-nav">
            <a href="/admin" class="admin-nav-link" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">
                <span>📊</span> Dashboard
            </a>
            <a href="/admin/san-pham" class="admin-nav-link"
                th:classappend="${currentPage == 'products' ? 'active' : ''}">
                <span>📦</span> Sản phẩm
            </a>
            <a href="/admin/don-hang" class="admin-nav-link"
                th:classappend="${currentPage == 'orders' ? 'active' : ''}">
                <span>🧾</span> Đơn hàng
            </a>
            <a href="/khach-hang" class="admin-nav-link" th:classappend="${currentPage == 'customers' ? 'active' : ''}">
                <span>👤</span> Khách hàng
            </a>
        </nav>

        <div style="margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <a href="/dang-nhap" class="admin-nav-link" style="color: #ff4757;">
                <span>🚪</span> Đăng xuất
            </a>
        </div>
    </aside>

</body>

</html>
