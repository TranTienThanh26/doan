<div th:fragment="fitting-modal" id="fittingModal" class="modal-overlay" style="display: none;">
    <div class="modal-content fitting-modal-content">
        <div class="modal-header">
            <h3>Phòng Thử Đồ Thông Minh (AI)</h3>
            <button class="close-modal" onclick="closeFittingRoom()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="fitting-container">
                <div class="canvas-wrapper">
                    <canvas id="fittingCanvas"></canvas>
                    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
                        <div class="loader"></div>
                        <p>Đang phân tích vóc dáng...</p>
                    </div>
                </div>

                <div class="fitting-controls">
                    <div class="upload-section">
                        <h4>1. Tải ảnh của bạn</h4>
                        <p class="instruction">Chọn ảnh chụp chính diện, đứng thẳng để AI nhận diện tốt nhất.</p>
                        <input type="file" id="userPhotoInput" accept="image/*" style="display: none;">
                        <button class="btn btn-outline" onclick="document.getElementById('userPhotoInput').click()">
                            <i class="fas fa-upload"></i> Chọn Ảnh
                        </button>
                    </div>

                    <!-- Token HF để bỏ qua quota nếu cần -->
                    <div class="upload-section">
                        <h4>Xác thực AI (Tùy chọn)</h4>
                        <p class="instruction">Dán HF Token nếu gặp lỗi "Quota". <a
                                href="https://huggingface.co/settings/tokens" target="_blank"
                                style="color: blue; text-decoration: underline;">Lấy tại đây</a></p>
                        <input type="password" id="hfTokenInput" class="form-control" placeholder="hf_..."
                            style="font-size: 12px; height: 30px;">
                    </div>

                    <div class="product-preview-section">
                        <h4>2. Sản phẩm đang thử</h4>
                        <div id="productToTry" class="product-to-try">
                            <img id="clothingImage" src="" alt="Product" crossorigin="anonymous">
                            <p id="productNameLabel"></p>
                            <small id="debugCategoryLabel"
                                style="color: #666; font-size: 10px; display: block; margin-top: 5px;"></small>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-primary btn-block" id="autoFitBtn" disabled onclick="startAutoFitting()">
                            Bắt đầu mặc thử
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fitting-modal-content {
            background: white;
            width: 90%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        .fitting-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .canvas-wrapper {
            position: relative;
            background: #f0f0f0;
            border-radius: 8px;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #fittingCanvas {
            max-width: 100%;
            max-height: 600px;
            display: block;
        }

        .fitting-controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .upload-section,
        .product-preview-section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
        }

        .instruction {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .product-to-try {
            text-align: center;
            margin-top: 10px;
        }

        .product-to-try img {
            max-width: 150px;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .btn-block {
            width: 100%;
        }

        @media (max-width: 768px) {
            .fitting-container {
                grid-template-columns: 1fr;
            }

            .canvas-wrapper {
                min-height: 300px;
            }
        }
    </style>
</div>
